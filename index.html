<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>En la lucha — SVG frame animation</title>

  <style>
    /* ============================================================
       CALM / ELEGANT FRAME-BY-FRAME SVG ANIMATION (flipbook)
       ------------------------------------------------------------
       Each SVG is one "frame". They play in order and loop.
       You edit two easy places:
         1) The FRAMES list in the <script> at the bottom
            -> list your SVG files in the order they should play.
         2) The colors / speeds in this <style> block.
       ============================================================ */

    :root {
      /* Background behind the frames (top -> bottom gradient).
         A soft warm neutral so your colorful art pops like a gallery. */
      --sky-top:    #f4efe7;
      --sky-bottom: #e6dccd;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; }

    body {
      background: linear-gradient(to bottom, var(--sky-top), var(--sky-bottom));
      overflow: hidden;
      font-family: system-ui, sans-serif;
    }

    /* The stage holds all frames stacked in the same spot. */
    .stage {
      position: relative;
      width: 100vw;
      height: 100vh;
    }

    /* Every frame fills the stage and starts hidden. The script
       fades exactly one frame in at a time. */
    .frame {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      /* The crossfade. Bigger = softer, dreamier transitions.
         Set to 0s for a hard "flipbook" cut instead. */
      transition: opacity 1.2s ease-in-out;
      will-change: opacity;
    }
    .frame.is-visible { opacity: 1; }

    .frame img {
      width: 100%;
      height: 100%;
      object-fit: contain;   /* show the whole illustration, no cropping */
      user-select: none;
      -webkit-user-drag: none;
    }

    /* Accessibility: if the viewer prefers no motion, just show
       the first frame without cycling. */
    @media (prefers-reduced-motion: reduce) {
      .frame { transition: none; }
    }
  </style>
</head>

<body>
  <!-- Frames get built by the script into this stage. -->
  <div class="stage" id="stage"></div>

  <script>
    /* ============================================================
       1) YOUR FRAMES — in play order.
          Put your files in the svg/ folder and list them here.
          Add or remove lines to match how many frames you have.
       ============================================================ */
    const FRAMES = [
      'svg/frame-1.svg',
      'svg/frame-2.svg',
      'svg/frame-3.svg',
    ];

    /* ============================================================
       2) TIMING — how long each frame stays on screen (ms).
          1000 = 1 second.  Lower = faster animation.
       ============================================================ */
    const FRAME_DURATION = 2000;

    /* ------------------------------------------------------------
       Engine below — you don't need to edit this.
       ------------------------------------------------------------ */
    const stage = document.getElementById('stage');

    // Build one <div class="frame"> per SVG.
    const frameEls = FRAMES.map((src) => {
      const div = document.createElement('div');
      div.className = 'frame';
      const img = document.createElement('img');
      img.src = src;
      img.alt = '';
      div.appendChild(img);
      stage.appendChild(div);
      return div;
    });

    let current = 0;
    frameEls[0]?.classList.add('is-visible');   // show the first frame

    const prefersReduced =
      window.matchMedia('(prefers-reduced-motion: reduce)').matches;

    // Advance to the next frame, looping back to the start.
    function nextFrame() {
      frameEls[current].classList.remove('is-visible');
      current = (current + 1) % frameEls.length;
      frameEls[current].classList.add('is-visible');
    }

    if (frameEls.length > 1 && !prefersReduced) {
      setInterval(nextFrame, FRAME_DURATION);
    }
  </script>
</body>
</html>
